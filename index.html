<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="我的 Web Apps 作品集 - 包含互動遊戲、工具程式等多個網頁應用">
    <title>我的 Web Apps | GitHub Pages</title>
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/portal.css">
  </head>
  <body>
    <div class="portal">
      <!-- 頭部區域 -->
      <header class="portal-header">
        <h1>🌟 我的 Web Apps 作品集</h1>
        <p>Welcome to my GitHub Pages | 歡迎來到我的網頁應用集合</p>
      </header>
      
      <!-- App 卡片網格 -->
      <div class="app-grid">
        <!-- App 1: 九九乘法表遊戲 -->
        <a href="apps/multiplication-game/" class="app-card">
          <span class="app-badge">新上線</span>
          <div class="app-icon">🎮</div>
          <h2>九九乘法表遊戲</h2>
          <p>有趣的互動遊戲，幫助小學生練習乘法表，包含關卡系統和成就徽章</p>
        </a>
        
        <!-- App 2: 創意蓋房子 -->
        <a href="apps/house-builder/" class="app-card">
          <span class="app-badge">新上線</span>
          <div class="app-icon">🏠</div>
          <h2>創意蓋房子</h2>
          <p>自由拖放元件建造房子，包含自由建造和挑戰模式，41 種精美元件</p>
        </a>
        
        <!-- App 3: 待開發 -->
        <div class="app-card coming-soon">
          <div class="app-icon">🔢</div>
          <h2>Coming Soon</h2>
          <p>敬請期待</p>
        </div>
      </div>
      
      <!-- 頁腳 -->
      <footer class="portal-footer">
        <p>Powered by GitHub Pages | Built with ❤️</p>
      </footer>
    </div>
  </body>
</html>
